name: dbt CI/CD with Schema Validation

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

env:
  DBT_TARGET: dev

jobs:
  dbt-ci:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history for diff detection
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .
          pip install sqlfluff[bigquery] sqlfluff-templater-dbt dbt-artifacts-parser
      
      - name: dbt parse (validate project structure)
        run: python -m dbt parse
      
      - name: dbt deps
        run: python -m dbt deps
      
      - name: Run sqlfluff for SQL linting
        run: |
          sqlfluff lint models/ --dialect bigquery --config .sqlfluff || true
      
      - name: Run Python tests
        run: python -m pytest tests/ -v --tb=short || true
      
      - name: dbt test (data quality)
        run: python -m dbt test --fail-fast
        continue-on-error: true
      
      - name: dbt docs generate
        run: python -m dbt docs generate
      
      - name: Archive test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dbt-run-results
          path: |
            target/run_results.json
            target/manifest.json
            target/index.html
      
      - name: Comment PR with validation results
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let resultsMessage = '✅ **dbt CI Validation Passed**\n\n';
            
            try {
              const manifest = JSON.parse(fs.readFileSync('./target/manifest.json'));
              const modelCount = Object.keys(manifest.nodes)
                .filter(k => k.startsWith('model.')).length;
              const sourceCount = Object.keys(manifest.sources || {}).length;
              
              resultsMessage += `- **Models:** ${modelCount}\n`;
              resultsMessage += `- **Sources:** ${sourceCount}\n`;
            } catch (e) {
              resultsMessage += `- Results available in artifacts\n`;
            }
            
            resultsMessage += '\n[📊 View full dbt docs](https://your-docs-url)';
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: resultsMessage
            });

  dbt-build-staging:
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    needs: dbt-ci
    runs-on: ubuntu-latest
    environment: staging
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .
      
      - name: Authenticate with GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SERVICE_ACCOUNT_JSON_STAGING }}
      
      - name: dbt run (staging)
        run: |
          python -m dbt deps
          python -m dbt run --target staging --profiles-dir .
      
      - name: dbt test (staging)
        run: python -m dbt test --target staging --profiles-dir .
