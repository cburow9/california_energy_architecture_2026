name: dbt CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  dbt:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install dbt-fusion
          python -m pip install .
      - name: Configure dbt-fusion
        env:
          FUSION_API_KEY: ${{ secrets.FUSION_API_KEY }}
          FUSION_PROJECT_ID: ${{ secrets.FUSION_PROJECT_ID }}
        run: |
          # Adjust the module/command if your package exposes a different entrypoint
          python -m dbt_fusion configure --project "$FUSION_PROJECT_ID"

      - name: Run dbt-fusion scan
        env:
          FUSION_API_KEY: ${{ secrets.FUSION_API_KEY }}
        run: |
          # Run a scan and upload results to Fusion (adjust flags as needed)
          python -m dbt_fusion scan --source dbt
      - name: Install dbt deps
        run: python -m dbt deps
      - name: Run dbt seed
        run: python -m dbt seed
      - name: Run dbt models
        run: python -m dbt run
      - name: Run dbt tests
        run: python -m dbt test
